  <!--
    Crawlable content for search engines and LLM crawlers. Flutter (CanvasKit)
    renders into a canvas that most bots cannot read, so the site's identity and
    key facts live here as real HTML. Flutter overlays this once it loads.
  -->

    <img src="og-image.jpg" alt="Jeay Sindh Students Federation (JSSF) logo" width="96" height="96">
    <h1>JSSF News — Jeay Sindh Students Federation</h1>

      Official news platform of the <strong>Jeay Sindh Students Federation (JSSF)</strong>,
      a Sindhi nationalist student organization. Read the latest news, statements,
      campaigns, and updates from JSSF.
    </p>
    <div class="spinner" aria-hidden="true"></div>
  </div>

  <noscript>
    <div style="max-width:680px;margin:40px auto;padding:0 24px;font-family:sans-serif;color:#1A1A2E;line-height:1.6;">
      <h1>Jeay Sindh Students’ Federation (JSSF)</h1>
      <p>
        The <strong>Jeay Sindh Students’ Federation (JSSF)</strong> is a student
        organization of Sindh, founded in <strong>1969</strong>. It is the student
        front of the Jeay Sindh movement and follows the ideals of
        <strong>G. M. Syed</strong>. The federation works for accessible education,
        the rights and dignity of students, and the language, history, and identity
        of the people of Sindh.
      </p>
      <h2>History</h2>
      <p>
        The federation honours <strong>4 March 1967</strong> as the Day of the
        Student Struggle of Sindh, marking the day a student procession from the
        University of Sindh toward Hyderabad was dispersed. JSSF was founded in 1969
        amid the movement against the One Unit scheme, and became the student front
        of the wider Jeay Sindh movement. It remembers the members who gave their
        lives — including those at Thori Phatak in 1984 — as martyrs of the student
        movement. Today it continues to organize students across the campuses of
        Sindh around education, rights, and heritage.
      </p>
      <p>This site also publishes the federation's latest news and updates. Please enable JavaScript to view the full interactive application.</p>
    </div>
  </noscript>
