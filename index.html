  <!-- Crawlable content for search engines and LLMs (the Flutter app renders to

    <main style="max-width:720px;margin:40px auto;padding:0 20px;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.65;color:#1a1a1a;">
      <h1>Bhoomi (ڀُومي) — The Magazine of Jeay Sindh Students' Federation</h1>
      <p><strong>Bhoomi</strong> is the official digital magazine of the
        <strong>Jeay Sindh Students' Federation (JSSF)</strong>. It publishes writing on
        Sindhi culture, politics, literature, and student affairs, in Sindhi and English.</p>

      <h2>What you'll find</h2>
      <ul>
        <li><strong>Editorials</strong> — the magazine's positions and commentary.</li>
        <li><strong>Interviews</strong> — conversations with writers, activists, and students.</li>
        <li><strong>Articles</strong> — reporting and essays from contributors.</li>
      </ul>

      <h2>Editions</h2>
      <p>Bhoomi is published in periodic <strong>editions</strong>. Each edition collects a
        set of pieces; the home page highlights a featured article and the rest of that
        edition, while the index lets you browse all pieces by section.</p>

      <h2>About JSSF</h2>
      <p>The Jeay Sindh Students' Federation is a Sindhi student organisation. Bhoomi is its
        platform for student and cultural writing.</p>

      <p><em>This is an interactive web application and requires JavaScript to run fully.</em></p>
    </main>
  </noscript>
